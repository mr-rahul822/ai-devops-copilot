services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - copilot-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U authuser -d authdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── KAFKA STACK ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - copilot-net
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      # Expose 9092 inside the Docker network, and 29092 to the host machine
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - copilot-net
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - copilot-net
    # Creates the metrics-stream topic and then exits
    command: >
      bash -c " echo 'Waiting for Kafka to be ready...' && cub kafka-ready -b kafka:9092 1 20 && kafka-topics --create --topic metrics-stream --partitions 1 --replication-factor 1 --if-not-exists --bootstrap-server kafka:9092 && echo 'Topic created successfully.' "

  # ── APP SERVICES ───────────────────────────────────────────────────────────
  auth-service:
    build: ../services/auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: authuser
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - copilot-net

  metrics-service:
    build: ../services/metrics-service
    container_name: metrics-service
    restart: unless-stopped
    env_file:
      - .env
      - ../services/metrics-service/.env
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DATABASE_URL: postgresql+asyncpg://authuser:${POSTGRES_PASSWORD}@postgres:5432/metricsdb
      AUTH_SERVICE_URL: http://auth-service:3001
      JWT_SECRET: ${JWT_SECRET}
      DEFAULT_USER_ID: 00000000-0000-0000-0000-000000000001
      COLLECTION_INTERVAL_SECONDS: 60
      ENVIRONMENT: development
      KAFKA_BROKER: kafka:9092
      PLATFORM_ACCOUNT_ID: ${PLATFORM_ACCOUNT_ID:-482624378370}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-2}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-I_NZZVow_HLrCYvQyOLDQlpr38VLtCAuZn_FyBo0Nvw=}
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - copilot-net

  alert-service:
    build: ../services/alert-service
    container_name: alert-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: alertsdb
      DB_USER: authuser
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: alert-service-group
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      metrics-service:
        condition: service_started
    networks:
      - copilot-net

  ai-engine:
    build: ../services/ai-engine
    container_name: ai-engine
    restart: unless-stopped
    env_file:
      - ../services/ai-engine/.env
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      DATABASE_URL: postgresql+asyncpg://authuser:${POSTGRES_PASSWORD}@postgres:5432/authdb
      PINECONE_INDEX_NAME: devops-incidents
      METRICS_SERVICE_URL: http://metrics-service:8001
      ALERT_SERVICE_URL: http://alert-service:3003
      AUTH_SERVICE_URL: http://auth-service:3001
      JWT_SECRET: ${JWT_SECRET}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      INTERNAL_SECRET: ${INTERNAL_SECRET:-devops-copilot-internal-2026}
    volumes:
      - ../model-cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service:
        condition: service_started
      alert-service:
        condition: service_started
    networks:
      - copilot-net

  # ── ACTION SERVICE (Phase 6) ──────────────────────────────────────────────
  action-service:
    build: ../services/action-service
    container_name: action-service
    restart: unless-stopped
    env_file:
      - .env
      - ../services/action-service/.env
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      DATABASE_URL: postgresql+asyncpg://authuser:${POSTGRES_PASSWORD}@postgres:5432/actionsdb
      AUTH_SERVICE_URL: http://auth-service:3001
      AI_ENGINE_URL: http://ai-engine:8002
      JWT_SECRET: ${JWT_SECRET}
      DRY_RUN: "true"
      PLATFORM_ACCOUNT_ID: ${PLATFORM_ACCOUNT_ID:-482624378370}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-2}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-devops-copilot-internal-2026}
    volumes:
      # Use the Linux docker socket path on all operating systems.
      # Docker Desktop (WSL2 backend) automatically maps this to the Windows Docker engine.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      ai-engine:
        condition: service_started
    networks:
      - copilot-net

  # ── FRONTEND (Phase 7) ───────────────────────────────────────────────────
  frontend:
    build: ../frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      auth-service:
        condition: service_started
      metrics-service:
        condition: service_started
      alert-service:
        condition: service_started
      ai-engine:
        condition: service_started
      action-service:
        condition: service_started
    networks:
      - copilot-net

volumes:
  pgdata:

networks:
  copilot-net:
    driver: bridge
